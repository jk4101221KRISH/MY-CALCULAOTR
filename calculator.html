<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink Balloon Calculator</title>
  <style>
    :root {
      --bg: #ffe6f0;
      --panel: #ffcce0;
      --panel-dark: #ff9cc9;
      --button: #ff8fc5;
      --button-hover: #ff6fae;
      --text: #3a1642;
      --result: #ffffff;
      --shadow: rgba(255, 117, 179, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #ffd4e8 0%, #ffb2d6 45%, #ff8fca 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    .calculator {
      position: relative;
      width: min(420px, calc(100vw - 32px));
      border-radius: 32px;
      background: linear-gradient(180deg, var(--panel) 0%, #ffe0ee 100%);
      padding: 30px;
      box-shadow: 0 20px 60px var(--shadow);
      overflow: hidden;
    }

    .calculator::before,
    .calculator::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.42);
      filter: blur(24px);
    }

    .calculator::before {
      top: -40px;
      left: -30px;
    }

    .calculator::after {
      bottom: -50px;
      right: -40px;
    }

    .display {
      width: 100%;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.84);
      padding: 22px 22px 14px;
      box-shadow: inset 0 2px 12px rgba(255, 255, 255, 0.7);
      margin-bottom: 24px;
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
    }

    .display .input,
    .display .output {
      width: 100%;
      text-align: right;
      word-break: break-all;
    }

    .display .input {
      font-size: 1rem;
      color: #8b547a;
    }

    .display .output {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    .buttons {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    button {
      border: none;
      border-radius: 22px;
      padding: 18px 0;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      color: #fff;
      box-shadow: 0 14px 24px rgba(255, 131, 173, 0.28);
    }

    button:hover {
      transform: translateY(-2px);
    }

    .btn-digit {
      background: linear-gradient(180deg, #ff9cc9 0%, #ff78b8 100%);
    }

    .btn-operator {
      background: linear-gradient(180deg, #ff6fae 0%, #ff4d96 100%);
    }

    .btn-clear {
      background: #fff5f9;
      color: #d44c7c;
      box-shadow: 0 14px 24px rgba(255, 135, 176, 0.18);
    }

    .btn-equal {
      grid-column: span 2;
      background: linear-gradient(180deg, #ff4d96 0%, #ff2075 100%);
      box-shadow: 0 18px 28px rgba(255, 80, 147, 0.42);
    }

    .btn-clear:hover,
    .btn-equal:hover {
      filter: brightness(1.05);
    }

    .balloon-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .balloon {
      position: absolute;
      bottom: 20px;
      width: 44px;
      height: 60px;
      border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
      background: radial-gradient(circle at 30% 20%, #fff, #ff8fc5 25%, #ff5aa4 100%);
      transform-origin: center bottom;
      opacity: 0;
    }

    .balloon::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -18px;
      width: 2px;
      height: 18px;
      background: #ff79af;
      transform: translateX(-50%);
    }

    .balloon.pop {
      animation: pop 0.7s ease forwards;
    }

    .balloon:nth-child(1) { left: 20%; }
    .balloon:nth-child(2) { left: 50%; width: 50px; height: 70px; }
    .balloon:nth-child(3) { left: 78%; width: 42px; height: 58px; }

    .balloon.animate {
      opacity: 1;
      animation: floatUp 1s ease-out forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      70% { transform: translateY(-90px) scale(1.05); opacity: 1; }
      100% { transform: translateY(-100px) scale(0.8); opacity: 0; }
    }

    @keyframes pop {
      0% { transform: scale(1); opacity: 1; }
      70% { transform: scale(1.7); opacity: 0.8; }
      100% { transform: scale(0.2); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="input" id="expression">0</div>
      <div class="output" id="result">0</div>
    </div>

    <div class="buttons">
      <button class="btn-clear" data-action="clear">AC</button>
      <button class="btn-operator" data-action="operator">/</button>
      <button class="btn-operator" data-action="operator">*</button>
      <button class="btn-operator" data-action="operator">-</button>

      <button class="btn-digit" data-action="digit">7</button>
      <button class="btn-digit" data-action="digit">8</button>
      <button class="btn-digit" data-action="digit">9</button>
      <button class="btn-operator" data-action="operator">+</button>

      <button class="btn-digit" data-action="digit">4</button>
      <button class="btn-digit" data-action="digit">5</button>
      <button class="btn-digit" data-action="digit">6</button>
      <button class="btn-digit" data-action="digit">1</button>

      <button class="btn-digit" data-action="digit">2</button>
      <button class="btn-digit" data-action="digit">3</button>
      <button class="btn-digit" data-action="digit">0</button>
      <button class="btn-digit" data-action="digit">.</button>

      <button class="btn-equal" data-action="equal">=</button>
    </div>

    <div class="balloon-container" id="balloon-container">
      <div class="balloon" id="balloon1"></div>
      <div class="balloon" id="balloon2"></div>
      <div class="balloon" id="balloon3"></div>
    </div>
  </div>

  <script>
    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');
    const buttons = document.querySelectorAll('button');
    const balloons = document.querySelectorAll('.balloon');
    let expression = '';

    function updateDisplay() {
      expressionEl.textContent = expression || '0';
    }

    function showResult(value) {
      resultEl.textContent = value;
      balloons.forEach((balloon, index) => {
        balloon.classList.remove('animate', 'pop');
        void balloon.offsetWidth;
        setTimeout(() => balloon.classList.add('animate'), index * 100);
      });

      setTimeout(() => {
        balloons.forEach((balloon, index) => {
          setTimeout(() => balloon.classList.add('pop'), index * 120);
        });
      }, 500);
    }

    function calculate() {
      if (!expression) return;
      try {
        const sanitized = expression.replace(/[^0-9.+\-*/() ]/g, '');
        const value = Function('return ' + sanitized)();
        const output = Number.isFinite(value) ? value : 'Error';
        showResult(output);
        expression = String(output === 'Error' ? '' : output);
      } catch (error) {
        showResult('Error');
        expression = '';
      }
      updateDisplay();
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const action = button.dataset.action;
        const text = button.textContent;

        if (action === 'digit') {
          if (expression === '0') expression = text;
          else expression += text;
        }

        if (action === 'operator') {
          if (!expression || /[+\-*/]$/.test(expression)) return;
          expression += text;
        }

        if (action === 'clear') {
          expression = '';
          resultEl.textContent = '0';
          balloons.forEach(balloon => balloon.classList.remove('animate', 'pop'));
        }

        if (action === 'equal') {
          calculate();
          return;
        }

        updateDisplay();
      });
    });
  </script>
</body>
</html>
